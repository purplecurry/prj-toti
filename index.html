<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🍅 토마토 캘린더</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f4f9; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .calendar-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        .tomato-icon { font-size: 60px; margin: 15px; }
        .input-group { margin-top: 20px; display: flex; gap: 5px; }
        #todo-input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #ddd; }
        .todo-list { margin-top: 25px; text-align: left; width: 100%; }
        .todo-item { background: #f9f9f9; margin: 8px 0; padding: 12px; border-radius: 10px; border-left: 5px solid #ff6b6b; list-style: none; }
        button { background: #ff6b6b; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; }
        button:hover { background: #ee5253; }
        .add-btn { width: auto !important; padding: 10px 15px !important; }
    </style>
</head>
<body>

    <div class="calendar-card">
        <h2 id="current-date">2026-03-23</h2>
        <div class="tomato-icon">🍅</div>
        <button onclick="loadDailyData()">오늘 데이터 불러오기</button>
        
        <div class="input-group">
            <input type="text" id="todo-input" placeholder="오늘 할 일을 입력하세요">
            <button onclick="addTodo()" class="add-btn">추가</button>
        </div>

        <div class="todo-list">
            <h3>오늘의 할 일</h3>
            <ul id="todo-items" style="padding: 0;"></ul>
        </div>
    </div>

    <script>
        async function loadDailyData() {
            const date = document.getElementById('current-date').innerText;
            try {
                const response = await fetch(`http://127.0.0.1:8000/daily/${date}`);
                const data = await response.json();
                const ul = document.getElementById('todo-items');
                ul.innerHTML = ""; 

                if (!data.todos || data.todos.length === 0) {
                    ul.innerHTML = "<li class='todo-item'>⚠️ 등록된 할 일이 없어요!</li>";
                    return;
                }

                data.todos.forEach(todo => {
                    const li = document.createElement('li');
                    li.className = 'todo-item';
                    li.innerText = `✅ ${todo.content || todo.title}`; // title이든 content든 있는걸로 표시
                    ul.appendChild(li);
                });
            } catch (error) {
                console.error("불러오기 에러:", error);
            }
        }

       async function addTodo() {
    const input = document.getElementById('todo-input');
    const content = input.value;
    const date = document.getElementById('current-date').innerText;

    if (!content) return alert("내용을 입력해주세요!");

    try {
        // 주소 뒤에 ?content=내용&user_id=1 이런 식으로 붙여서 보냅니다.
        const url = `http://127.0.0.1:8000/todo?content=${encodeURIComponent(content)}&user_id=1&date=${date}`;
        
        console.log("보내는 주소:", url);

        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Accept': 'application/json' }
            // body는 비워둡니다.
        });

        if (response.ok) {
            console.log("추가 성공!");
            input.value = ""; 
            await loadDailyData(); 
        } else {
            const errorDetail = await response.json();
            console.error("서버 거절 상세:", errorDetail);
            // 만약 여기서 에러가 나면, detail 안의 메시지를 직접 띄웁니다.
            alert("에러 발생: " + errorDetail.detail[0].msg);
        }
    } catch (error) {
        console.error("연결 에러:", error);
        alert("서버 연결 실패!");
    }
}

        window.onload = loadDailyData;
    </script>
</body>
</html>
