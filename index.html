<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="토마토 학습 매니저 데모">
    <meta name="keywords" content="학습, 캘린더, Todo">
    <title>토마토 학습 매니저</title>
    <style>
        :root { --main-color: #ff6b6b; --bg-color: #f8f9fa; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; padding: 50px; }
        .container { width: 800px; display: grid; grid-template-columns: 1fr 1fr; gap: 30px; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .calendar-side h2 { color: #333; margin-bottom: 20px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day { padding: 15px 5px; text-align: center; cursor: pointer; border-radius: 10px; border: 1px solid #eee; transition: 0.2s; }
        .day:hover { background: #fff0f0; border-color: var(--main-color); }
        .day.active { background: var(--main-color); color: white; font-weight: bold; border-color: var(--main-color); }
        .detail-side { border-left: 1px solid #eee; padding-left: 30px; }
        .date-badge { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; color: var(--main-color); }
        #todo-list { list-style: none; padding: 0; margin: 20px 0; min-height: 100px; border-top: 2px solid #f0f0f0; }
        #todo-list li { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.95rem; }
        .input-group { display: flex; gap: 5px; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        button { padding: 10px 15px; background: var(--main-color); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .full-button { width: 100%; margin-top: 10px; }
        textarea { width: 100%; height: 100px; border-radius: 8px; border: 1px solid #ddd; padding: 10px; margin-top: 10px; resize: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="calendar-side">
        <h2>2026 MAR</h2>
        <div class="calendar-grid" id="calendar-grid"></div>
    </div>
    <div class="detail-side">
        <div class="date-badge" id="selected-date-text">날짜를 선택하세요</div>
        <input type="hidden" id="current-date">
        <h3>✅ 오늘의 Todo</h3>
        <ul id="todo-list"></ul>
        <div class="input-group">
            <input type="text" id="todo-input" placeholder="할 일 입력...">
            <button type="button" onclick="addTodo()">추가</button>
        </div>
        <div class="memo-section">
            <h3>📝 학습 기록</h3>
            <textarea id="memo-area" placeholder="내용을 기록하세요..."></textarea>
            <button type="button" onclick="alert('저장되었습니다!')" class="full-button">💾 기록 저장</button>
        </div>
    </div>
</div>
<script>
    const API_BASE = "http://127.0.0.1:8000/calendar";
    function initCalendar() {
        const grid = document.getElementById('calendar-grid');
        for (let i = 1; i <= 31; i++) {
            const dayDiv = document.createElement('div');
            dayDiv.className = 'day';
            dayDiv.innerText = i;
            dayDiv.onclick = () => selectDate(i, dayDiv);
            grid.appendChild(dayDiv);
        }
    }
    async function selectDate(day, element) {
        const dateStr = `2026-03-${day.toString().padStart(2, '0')}`;
        document.getElementById('current-date').value = dateStr;
        document.getElementById('selected-date-text').innerText = dateStr;
        document.querySelectorAll('.day').forEach(d => d.classList.remove('active'));
        element.classList.add('active');
        loadDailyData(dateStr);
    }
    async function loadDailyData(date) {
        try {
            const res = await fetch(`${API_BASE}/daily/${date}`);
            const data = await res.json();
            const list = document.getElementById('todo-list');
            list.innerHTML = "";
            if (data.todos && data.todos.length > 0) {
                data.todos.forEach(todo => {
                    const li = document.createElement('li');
                    li.innerText = (todo.is_completed ? "✅ " : "⬜ ") + todo.content;
                    list.appendChild(li);
                });
            } else {
                list.innerHTML = "<li style='color:gray; padding:20px;'>할 일이 없습니다.</li>";
            }
            document.getElementById('memo-area').value = data.memo || "";
        } catch (e) { console.error(e); }
    }
    async function addTodo() {
        const input = document.getElementById('todo-input');
        const date = document.getElementById('current-date').value;
        if (!input.value || !date) return;
        await fetch(`${API_BASE}/todo?content=${encodeURIComponent(input.value)}&date=${date}&user_id=1`, {method:'POST'});
        input.value = "";
        loadDailyData(date);
    }
    window.onload = initCalendar;
</script>
</body>
</html>
