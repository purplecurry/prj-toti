<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>설정 수정 - Toti</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f5f5f5;
      font-family: sans-serif;
    }

    .card {
      background: #ffffff;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 40px 36px;
      width: 400px;
      box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 1.6em;
      color: #333;
      margin-bottom: 28px;
      text-align: center;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }

    label {
      font-size: 0.9em;
      color: #555;
    }

    input, select {
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1em;
      background: #f9f9f9;
      transition: border 0.2s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #e57373;
      background: #fff;
    }

    .error-msg {
      font-size: 0.8em;
      color: #e57373;
      min-height: 16px;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 0.95em;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary {
      background: #e57373;
      color: white;
    }

    .btn-primary:hover {
      background: #ef9a9a;
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
      border: 1px solid #ccc;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .success-msg {
      font-size: 0.85em;
      color: #4caf50;
      text-align: center;
      min-height: 18px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>설정 수정</h1>

    <div class="form-group">
      <label for="goal-minutes">목표 시간 (분) <span style="color:#aaa; font-size:0.85em;">1~1440</span></label>
      <input type="number" id="goal-minutes" min="1" max="1440" placeholder="예: 120">
      <span class="error-msg" id="goal-error"></span>
    </div>

    <div class="form-group">
      <label for="focus-time">기본 집중 시간 (분) <span style="color:#aaa; font-size:0.85em;">1~1440</span></label>
      <input type="number" id="focus-time" min="1" max="1440" placeholder="예: 25">
      <span class="error-msg" id="focus-error"></span>
    </div>

    <div class="form-group">
      <label for="break-time">기본 휴식 시간 (분) <span style="color:#aaa; font-size:0.85em;">1~1440</span></label>
      <input type="number" id="break-time" min="1" max="1440" placeholder="예: 5">
      <span class="error-msg" id="break-error"></span>
    </div>

    <div class="form-group">
      <label for="ai-mode">AI 모드</label>
      <select id="ai-mode">
        <option value="">선택 안 함</option>
        <option value="집중 모드">집중 모드</option>
        <option value="휴식 모드">휴식 모드</option>
        <option value="학습 모드">학습 모드</option>
      </select>
    </div>

    <div class="btn-group">
      <button class="btn btn-primary" id="save-btn">저장</button>
      <button class="btn btn-secondary" id="back-btn">돌아가기</button>
    </div>
    <div class="success-msg" id="success-msg"></div>
  </div>

  <script>
    const token = localStorage.getItem("access_token");

    if (!token) {
      alert("로그인이 필요합니다.");
      window.location.href = "/users/login-page";
    }

    async function loadCurrentSettings() {
      try {
        const res = await fetch("/users/mypage", {
          headers: { "Authorization": `Bearer ${token}` }
        });

        if (res.status === 401) {
          alert("로그인이 필요합니다.");
          window.location.href = "/users/login-page";
          return;
        }

        const data = await res.json();
        document.getElementById("goal-minutes").value = data.goal_minutes;
        document.getElementById("focus-time").value = data.default_focus_time;
        document.getElementById("break-time").value = data.default_break_time;
        document.getElementById("ai-mode").value = data.ai_mode || "";
      } catch (err) {
        console.error("설정 불러오기 실패", err);
      }
    }

    loadCurrentSettings();

    document.getElementById("save-btn").addEventListener("click", async () => {
      document.getElementById("goal-error").textContent = "";
      document.getElementById("focus-error").textContent = "";
      document.getElementById("break-error").textContent = "";
      document.getElementById("success-msg").textContent = "";

      const goal_minutes = parseInt(document.getElementById("goal-minutes").value);
      const default_focus_time = parseInt(document.getElementById("focus-time").value);
      const default_break_time = parseInt(document.getElementById("break-time").value);
      const ai_mode = document.getElementById("ai-mode").value;

      let valid = true;

      if (!goal_minutes || goal_minutes <= 0 || goal_minutes > 1440) {
        document.getElementById("goal-error").textContent = "목표 시간은 1분 이상 1440분 이하여야 합니다.";
        valid = false;
      }
      if (!default_focus_time || default_focus_time <= 0 || default_focus_time > 1440) {
        document.getElementById("focus-error").textContent = "집중 시간은 1분 이상 1440분 이하여야 합니다.";
        valid = false;
      }
      if (!default_break_time || default_break_time <= 0 || default_break_time > 1440) {
        document.getElementById("break-error").textContent = "휴식 시간은 1분 이상 1440분 이하여야 합니다.";
        valid = false;
      }

      if (!valid) return;

      try {
        const res = await fetch("/users/settings", {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({ goal_minutes, default_focus_time, default_break_time, ai_mode })
        });

        const data = await res.json();

        if (res.ok) {
          document.getElementById("success-msg").textContent = "설정이 저장되었습니다!";
          setTimeout(() => {
            window.location.href = "/users/mypage-page";
          }, 1200);
        } else {
          document.getElementById("success-msg").style.color = "#e57373";
          document.getElementById("success-msg").textContent = data.detail || "저장에 실패했습니다.";
        }
      } catch (err) {
        console.error("설정 저장 실패", err);
        alert("서버와 연결할 수 없습니다.");
      }
    });

    document.getElementById("back-btn").addEventListener("click", () => {
      window.location.href = "/users/mypage-page";
    });
  </script>
</body>
</html>
