<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 - Toti</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f5f5f5;
      font-family: sans-serif;
    }

    .card {
      background: #ffffff;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 40px 36px;
      width: 360px;
      box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 1.6em;
      color: #333;
      margin-bottom: 28px;
      text-align: center;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }

    label {
      font-size: 0.9em;
      color: #555;
    }

    input {
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1em;
      background: #f9f9f9;
      transition: border 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #e57373;
      background: #fff;
    }

    .error-msg {
      font-size: 0.8em;
      color: #e57373;
      min-height: 16px;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: #e57373;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1em;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }

    .btn:hover {
      background: #ef9a9a;
    }

    .login-link {
      text-align: center;
      margin-top: 16px;
      font-size: 0.9em;
      color: #777;
    }

    .login-link a {
      color: #e57373;
      text-decoration: none;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    .success-msg {
      font-size: 0.85em;
      color: #4caf50;
      text-align: center;
      min-height: 18px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>회원가입</h1>

    <div class="form-group">
      <label for="email">이메일</label>
      <input type="email" id="email" placeholder="example@email.com">
      <span class="error-msg" id="email-error"></span>
    </div>

    <div class="form-group">
      <label for="password">비밀번호 <span style="color:#aaa; font-size:0.85em;">(최소 6자)</span></label>
      <input type="password" id="password" placeholder="비밀번호를 입력하세요">
      <span class="error-msg" id="password-error"></span>
    </div>

    <div class="form-group">
      <label for="password-confirm">비밀번호 확인</label>
      <input type="password" id="password-confirm" placeholder="비밀번호를 한 번 더 입력하세요">
      <span class="error-msg" id="password-confirm-error"></span>
    </div>

    <div class="form-group">
      <label for="nickname">닉네임 <span style="color:#aaa; font-size:0.85em;">(1~20자)</span></label>
      <input type="text" id="nickname" placeholder="닉네임을 입력하세요">
      <span class="error-msg" id="nickname-error"></span>
    </div>

    <button class="btn" id="signup-btn">가입하기</button>
    <div class="success-msg" id="success-msg"></div>

    <div class="login-link">
      이미 계정이 있으신가요? <a href="/users/login-page">로그인</a>
    </div>
  </div>

  <script>
    const signupBtn = document.getElementById("signup-btn");

    signupBtn.addEventListener("click", async () => {
      document.getElementById("email-error").textContent = "";
      document.getElementById("password-error").textContent = "";
      document.getElementById("password-confirm-error").textContent = "";
      document.getElementById("nickname-error").textContent = "";
      document.getElementById("success-msg").textContent = "";

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const passwordConfirm = document.getElementById("password-confirm").value;
      const nickname = document.getElementById("nickname").value.trim();

      let valid = true;

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!email) {
        document.getElementById("email-error").textContent = "이메일을 입력해주세요.";
        valid = false;
      } else if (!emailRegex.test(email)) {
        document.getElementById("email-error").textContent = "이메일 양식을 확인해 주세요.";
        valid = false;
      }

      if (password.length < 6) {
        document.getElementById("password-error").textContent = "비밀번호는 최소 6자 이상이어야 합니다.";
        valid = false;
      }

      if (!passwordConfirm) {
        document.getElementById("password-confirm-error").textContent = "비밀번호 확인을 입력해주세요.";
        valid = false;
      } else if (password !== passwordConfirm) {
        document.getElementById("password-confirm-error").textContent = "비밀번호가 일치하지 않습니다.";
        valid = false;
      }

      if (!nickname || nickname.length > 20) {
        document.getElementById("nickname-error").textContent = "닉네임은 1~20자 사이여야 합니다.";
        valid = false;
      }

      if (!valid) return;

      try {
        const res = await fetch("/users/signup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password, nickname })
        });

        const data = await res.json();

        if (res.ok) {
          document.getElementById("success-msg").textContent = "가입이 완료되었습니다! 로그인 페이지로 이동합니다.";
          setTimeout(() => {
            window.location.href = "/users/login-page";
          }, 1500);
        } else {
          if (data.detail === "Email already exists") {
            document.getElementById("email-error").textContent = "이미 사용 중인 이메일입니다.";
          } else {
            document.getElementById("email-error").textContent = data.detail || "회원가입에 실패했습니다.";
          }
        }
      } catch (err) {
        console.error("서버 연결 실패", err);
        alert("서버와 연결할 수 없습니다.");
      }
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") signupBtn.click();
    });
  </script>
</body>
</html>
