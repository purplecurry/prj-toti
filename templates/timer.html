<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Pomodoro Timer</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f5f5f5;
    }

    .timer-container {
      position: relative;
      width: 300px;
      height: 300px;
      margin-bottom: 20px;
    }

    /* 원형 진행바 (SVG) */
    .circle {
      position: absolute;
      top: 0;
      left: 0;
    }

    #focus-circle{
      fill: none;
      stroke-width: 40;
      stroke-linecap: round;
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
      transition: stroke-dashoffset 1s linear; /* 부드럽게 변화 */
      stroke: red;
    }

    #break-circle {
      fill: none;
      stroke-width: 20;
      stroke-linecap: round;
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
      transition: stroke-dashoffset 1s linear; /* 부드럽게 변화 */
      stroke: green;
    }

    /* 중앙 박스 */
    .time-box {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #d0d0d0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .counter {
      font-size: 1.2em;
      color: black;
      margin-bottom: 10px;
      font-weight: normal;
    }

    .big-time {
      font-size: 2em;
      font-weight: bold;
      color: black;
    }

    .small-time {
      font-size: 1.2em;
      color: black;
      margin-top: 10px;
    }

    /* 하단 바 전체 */
    .bottom-bar {
      display: flex;
      justify-content: space-between; /* 왼쪽은 inputs, 오른쪽은 버튼 */
      align-items: center;
      width: 800px; /* 가로 길이 확장 */
      margin-top: 50px; /* 타이머와 간격 확보 */
      padding: 15px 20px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #f9f9f9;
    }

    /* 입력 박스 */
    .inputs {
      display: flex;
      gap: 15px;
      font-size: 1.5em; /* 글자 크기 확대 */
    }

    .inputs input {
      width: 90px;
      font-size: 1.2em;
      text-align: center;
    }

    /* 버튼 */
    .controls {
      display: flex;
      flex-direction: row; /* 버튼 가로 정렬 */
      gap: 10px;
    }

    .controls button {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 50px;   /* 버튼 크기 고정 */
      height: 50px;  /* 버튼 크기 고정 */
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #f0f0f0;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .controls button:hover {
      background: #e0e0e0;
    }

    .controls svg {
      width: 24px;   /* 아이콘 크기 고정 */
      height: 24px;
      fill: #333;
    }
  </style>
</head>
<body>
  <div class="timer-container">
    <!-- 집중 타이머 (빨간색 원형) -->
    <svg class="circle" width="300" height="300">
      <circle id="focus-circle" cx="150" cy="150" r="100" />
    </svg>

    <!-- 휴식 타이머 (녹색 원형) -->
    <svg class="circle" width="300" height="300">
      <circle id="break-circle" cx="150" cy="150" r="90" />
    </svg>

    <div class="time-box">
      <div class="counter" id="counter">0/4</div>
      <div class="big-time" id="focus-time">25:00</div>
      <div class="small-time" id="break-time">05:00</div>
    </div>
  </div>


<!-- 하단 입력 + 버튼을 한 줄로 -->
<div class="bottom-bar">
  <div class="inputs">
    <label>집중 <input type="number" id="focus-input" value="25"></label>
    <label>휴식 <input type="number" id="break-input" value="5"></label>
    <label>횟수 <input type="number" id="count-input" value="4"></label>
  </div>
  <div class="controls">
    <!-- 재생 버튼 -->
    <button id="start-btn">
      <svg id="start-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M8 5v14l11-7z"/> <!-- ▶ 아이콘 -->
      </svg>
    </button>

    <!-- 정지 버튼 -->
    <button id="stop-btn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <rect x="6" y="6" width="12" height="12"/> <!-- ■ 아이콘 -->
      </svg>
    </button>
  </div>
</div>

  <script>
    let focusTime, breakTime, totalCount;
    let currentCount = 0;
    let timer = null;
    let isRunning = false;
    let isPaused = false;
    let isFocus = true;
    let remainingTime;

    const focusDisplay = document.getElementById("focus-time");
    const breakDisplay = document.getElementById("break-time");
    const counterDisplay = document.getElementById("counter");
    const startBtn = document.getElementById("start-btn");
    const stopBtn = document.getElementById("stop-btn");

    const focusCircle = document.getElementById("focus-circle");
    const breakCircle = document.getElementById("break-circle");

    // 원 둘레 계산
    const focusCircumference = 2 * Math.PI * 100; // r=120
    const breakCircumference = 2 * Math.PI * 90;  // r=90

    focusCircle.style.strokeDasharray = focusCircumference;
    focusCircle.style.strokeDashoffset = focusCircumference;

    breakCircle.style.strokeDasharray = breakCircumference;
    breakCircle.style.strokeDashoffset = breakCircumference;

    /* ▶ 아이콘 */
    function setPlayIcon() {
      startBtn.innerHTML = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M8 5v14l11-7z"/>
        </svg>`;
    }

    /* ⏸ 아이콘 */
    function setPauseIcon() {
      startBtn.innerHTML = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M6 19h4V5H6zm8-14v14h4V5z"/>
        </svg>`;
    }

    function updateDisplays() {
      focusDisplay.textContent = formatTime(focusTime * 60);
      breakDisplay.textContent = formatTime(breakTime * 60);
      counterDisplay.textContent = `${currentCount}/${totalCount}`;
    }

    function formatTime(seconds) {
      const m = String(Math.floor(seconds / 60)).padStart(2, "0");
      const s = String(seconds % 60).padStart(2, "0");
      return `${m}:${s}`;
    }

    function updateProgress() {
      if (isFocus) {
        const progress = remainingTime / (focusTime * 60);
        focusCircle.style.strokeDashoffset = focusCircumference * progress;
      } else {
        const progress = remainingTime / (breakTime * 60);
        breakCircle.style.strokeDashoffset = breakCircumference * progress;
      }
    }

    function startTimer() {
      if (!isRunning) {
        // 처음 시작
        focusTime = parseInt(document.getElementById("focus-input").value);
        breakTime = parseInt(document.getElementById("break-input").value);
        totalCount = parseInt(document.getElementById("count-input").value);
        currentCount = 0;
        isFocus = true;
        remainingTime = focusTime * 60;
        updateDisplays();
        runInterval();
        isRunning = true;
        isPaused = false;
        setPauseIcon(); // ▶ → ⏸
      } else if (!isPaused) {
        // 실행 중 → 일시정지
        clearInterval(timer);
        timer = null;
        isPaused = true;
        setPlayIcon(); // ⏸ → ▶
      } else {
        // 일시정지 상태 → 재개
        runInterval();
        isPaused = false;
        setPauseIcon(); // ▶ → ⏸
      }
    }

    function runInterval() {
      timer = setInterval(runTimer, 1000);
    }

    function runTimer() {
      remainingTime--;
      if (isFocus) {
        focusDisplay.textContent = formatTime(remainingTime);
      } else {
        breakDisplay.textContent = formatTime(remainingTime);
      }

      updateProgress(); // 진행률 업데이트

      if (remainingTime <= 0) {
        if (isFocus) {
          currentCount++;
          counterDisplay.textContent = `${currentCount}/${totalCount}`;
          if (currentCount >= totalCount) {
            stopTimer(); // 종료
            return;
          }
          isFocus = false;
          remainingTime = breakTime * 60;
        } else {
          isFocus = true;
          remainingTime = focusTime * 60;
        }
      }
    }

    function stopTimer() {
      clearInterval(timer);
      timer = null;
      isRunning = false;
      isPaused = false;
      currentCount = 0;
      updateDisplays();
      setPlayIcon(); // 항상 ▶로 초기화
      // 원형 진행률 초기화
      focusCircle.style.strokeDashoffset = focusCircumference;
      breakCircle.style.strokeDashoffset = breakCircumference;
    }

    startBtn.addEventListener("click", startTimer);
    stopBtn.addEventListener("click", stopTimer);

    /* 초기 상태: ▶ 아이콘 */
    setPlayIcon();
  </script>
</body>
</html>
