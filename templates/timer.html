<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Pomodoro Timer</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --tomato: #e8392a;
      --tomato-light: #ff6b5b;
      --tomato-pale: #fff0ee;
      --tomato-dark: #c0281b;
      --leaf: #4a7c3f;
      --cream: #fff8f6;
      --text-dark: #3a1a14;
      --text-mid: #7a4a42;
      --text-light: #c49990;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: var(--cream);
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(232,57,42,0.07) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(232,57,42,0.05) 0%, transparent 60%);
    }

    /* 타이머 원 - 크게 */
    .timer-container {
      position: relative;
      width: 420px;
      height: 420px;
      margin-bottom: 28px;
      filter: drop-shadow(0 8px 32px rgba(232,57,42,0.15));
    }

    .circle {
      position: absolute;
      top: 0;
      left: 0;
    }

    #focus-circle {
      fill: none;
      stroke-width: 28;
      stroke-linecap: round;
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
      transition: stroke-dashoffset 1s linear;
      stroke: var(--tomato);
    }

    #break-circle {
      fill: none;
      stroke-width: 14;
      stroke-linecap: round;
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
      transition: stroke-dashoffset 1s linear;
      stroke: #4caf50;
    }

    /* 중앙 원 */
    .time-box {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #fff5f3, #fde8e4);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 4px;
    }

    .counter {
      font-size: 1em;
      color: var(--text-light);
      font-weight: 600;
      letter-spacing: 0.08em;
    }

    .big-time {
      font-size: 3.2em;
      font-weight: 800;
      color: var(--text-dark);
      letter-spacing: -0.02em;
    }

    .small-time {
      font-size: 1.1em;
      color: var(--text-mid);
      font-weight: 600;
      margin-top: 2px;
    }

    /* 하단 바 - 작고 아담하게 */
    .bottom-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      padding: 10px 24px;
      border-radius: 50px;
      background: white;
      box-shadow: 0 2px 16px rgba(232,57,42,0.1);
      border: 1.5px solid rgba(232,57,42,0.1);
    }

    .inputs {
      display: flex;
      gap: 12px;
      align-items: center;
      font-size: 0.85em;
      color: var(--text-mid);
      font-weight: 700;
    }

    .inputs label {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .inputs input {
      width: 44px;
      font-size: 0.95em;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      text-align: center;
      border: 1.5px solid rgba(232,57,42,0.2);
      border-radius: 8px;
      padding: 4px 0;
      color: var(--text-dark);
      background: var(--tomato-pale);
      outline: none;
    }

    .inputs input:focus {
      border-color: var(--tomato);
    }

    .divider {
      width: 1px;
      height: 24px;
      background: rgba(232,57,42,0.15);
    }

    /* 재생/정지 버튼 */
    .controls {
      display: flex;
      gap: 8px;
    }

    .controls button {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 38px;
      height: 38px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    #start-btn {
      background: var(--tomato);
      box-shadow: 0 3px 10px rgba(232,57,42,0.35);
    }
    #start-btn:hover {
      background: var(--tomato-dark);
      transform: scale(1.08);
    }
    #start-btn svg { fill: white; width: 18px; height: 18px; }

    #stop-btn {
      background: var(--tomato-pale);
      border: 1.5px solid rgba(232,57,42,0.2);
    }
    #stop-btn:hover {
      background: #ffddd9;
      transform: scale(1.08);
    }
    #stop-btn svg { fill: var(--tomato); width: 16px; height: 16px; }

    /* 메모 박스 */
    .memo-box {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 300px;
      height: 400px;
      border: 1.5px solid rgba(232,57,42,0.15);
      border-radius: 16px;
      background: #ffffff;
      box-shadow: 0 8px 32px rgba(232,57,42,0.12);
      resize: both;
      overflow: hidden;
      z-index: 1000;
      display: none;
    }

    .memo-header {
      background: var(--tomato-pale);
      padding: 8px 12px;
      cursor: move;
      font-weight: 800;
      font-size: 0.9em;
      color: var(--tomato-dark);
      border-bottom: 1.5px solid rgba(232,57,42,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .memo-header button {
      background: var(--tomato);
      color: white;
      border: none;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      cursor: pointer;
      font-size: 1em;
      line-height: 1;
    }

    .memo-content {
      padding: 10px;
      height: calc(100% - 40px);
      overflow-y: auto;
    }

    .memo-item {
      border: 1px solid rgba(232,57,42,0.12);
      border-radius: 8px;
      margin-bottom: 8px;
      overflow: hidden;
    }

    .memo-title {
      background: var(--tomato-pale);
      padding: 7px 10px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.88em;
      font-weight: 700;
      color: var(--text-dark);
    }

    .memo-title span { flex-grow: 1; }

    .memo-actions { display: flex; gap: 4px; }
    .memo-actions button { background: none; border: none; cursor: pointer; font-size: 0.9em; }

    .memo-body {
      display: none;
      padding: 8px 10px;
      background: white;
      font-size: 0.85em;
      color: var(--text-mid);
    }

    .memo-title span.placeholder,
    .memo-body.placeholder {
      color: var(--text-light);
      font-style: italic;
    }

    /* 우측 상단 버튼 */
    .top-right-buttons {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 2000;
    }

    .circle-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: white;
      box-shadow: 0 3px 12px rgba(232,57,42,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1.5px solid rgba(232,57,42,0.12);
      font-size: 1.2em;
    }

    .circle-btn:hover {
      transform: scale(1.12) rotate(-5deg);
      box-shadow: 0 5px 18px rgba(232,57,42,0.28);
      background: var(--tomato-pale);
    }

    .circle-btn svg {
      width: 20px;
      height: 20px;
      fill: var(--tomato);
    }

    /* BGM 켜져있을 때 */
    .circle-btn.bgm-on {
      background: var(--tomato);
    }
    .circle-btn.bgm-on svg {
      fill: white;
    }

  </style>
</head>
<body>
  <!-- 메모 관련 -->
  <div id="memo-box" class="memo-box">
    <div id="memo-header" class="memo-header">
      메모
      <button id="add-memo-btn">+</button>
    </div>
    <div id="memo-content" class="memo-content">
      <!-- 메모 항목들이 여기에 추가됨 -->
    </div>
  </div>

  <!-- 우측 상단 버튼 -->
  <div class="top-right-buttons">
    <!-- 마이페이지 버튼 -->
    <button class="circle-btn" title="마이페이지">👤</button>

    <!-- 캘린더 버튼 -->
    <button class="circle-btn" title="캘린더">📅</button>

    <!-- 메모 박스 열고 닫기 버튼 -->
    <button class="circle-btn" title="메모">📝</button>

    <!-- BGM 버튼 -->
    <button class="circle-btn" id="bgm-btn" title="배경음악">🎵</button>
  </div>
  
  <!-- 타이머 및 관련 버튼 -->
  <div class="timer-container">
    <!-- 집중 타이머 (빨간색 원형) -->
    <svg class="circle" width="420" height="420">
      <circle id="focus-circle" cx="210" cy="210" r="175" />
    </svg>

    <!-- 휴식 타이머 (녹색 원형) -->
    <svg class="circle" width="420" height="420">
      <circle id="break-circle" cx="210" cy="210" r="158" />
    </svg>

    <div class="time-box">
      <div class="counter" id="counter">0/4</div>
      <div class="big-time" id="focus-time">25:00</div>
      <div class="small-time" id="break-time">05:00</div>
    </div>
  </div>


<!-- 하단 입력 + 버튼을 한 줄로 -->
<div class="bottom-bar">
  <div class="inputs">
    <label>집중 <input type="number" id="focus-input" value="25"></label>
    <label>휴식 <input type="number" id="break-input" value="5"></label>
    <label>횟수 <input type="number" id="count-input" value="4"></label>
  </div>
  <div class="divider"></div>
  <div class="controls">
    <button id="start-btn">
      <svg id="start-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M8 5v14l11-7z"/>
      </svg>
    </button>
    <button id="stop-btn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <rect x="6" y="6" width="12" height="12"/>
      </svg>
    </button>
  </div>
</div>

  <script>
    let focusTime = 25;
    let breakTime = 5;
    let totalCount;
    let currentCount = 0;
    let timer = null;
    let isRunning = false;
    let isPaused = false;
    let isFocus = true;
    let remainingTime;

    const focusDisplay = document.getElementById("focus-time");
    const breakDisplay = document.getElementById("break-time");
    const counterDisplay = document.getElementById("counter");
    const startBtn = document.getElementById("start-btn");
    const stopBtn = document.getElementById("stop-btn");

    const focusCircle = document.getElementById("focus-circle");
    const breakCircle = document.getElementById("break-circle");
    const memoContent = document.getElementById("memo-content");
    // 원 둘레 계산
    const focusCircumference = 2 * Math.PI * 175; // r=175
    const breakCircumference = 2 * Math.PI * 158;  // r=158

    // 서버에서 값 가져오기
    async function loadTimerData() {
      try {
        const res = await fetch("/timer/api/timer-data", { credentials: "include" });
        if (!res.ok) return;
        const data = await res.json();
        focusTime = data.focus_time;
        breakTime = data.break_time;
        document.getElementById("focus-input").value = focusTime;
        document.getElementById("break-input").value = breakTime;
      } catch (err) {
        console.error("타이머 데이터 불러오기 실패", err);
      }
    }
    // 페이지 로드 시 실행
    loadTimerData();

async function loadMemos() {
  try {
    const res = await fetch("/timer/api/memos", { credentials: "include" });
    if (!res.ok) return;
    const data = await res.json();

    memoContent.innerHTML = "";

    data.memos.forEach(m => {
      const memoItem = document.createElement("div");
      memoItem.className = "memo-item";
      memoItem.dataset.id = m.id; // id 저장

      memoItem.innerHTML = `
        <div class="memo-title">
          <span>${m.title}</span>
          <div class="memo-actions">
            <button class="edit-btn">✏️</button>
            <button class="delete-btn">🗑️</button>
          </div>
        </div>
        <div class="memo-body" style="display:none;">불러오기 전 내용...</div>
      `;

      memoContent.appendChild(memoItem);

      // 서버 메모는 placeholder 적용 X
      attachMemoEvents(memoItem, false);
    });
  } catch (err) {
    console.error("메모 불러오기 실패", err);
  }
}

    focusCircle.style.strokeDasharray = focusCircumference;
    focusCircle.style.strokeDashoffset = focusCircumference;

    breakCircle.style.strokeDasharray = breakCircumference;
    breakCircle.style.strokeDashoffset = breakCircumference;

    /* ▶ 아이콘 */
    function setPlayIcon() {
      startBtn.innerHTML = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M8 5v14l11-7z"/>
        </svg>`;
    }

    /* ⏸ 아이콘 */
    function setPauseIcon() {
      startBtn.innerHTML = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M6 19h4V5H6zm8-14v14h4V5z"/>
        </svg>`;
    }

    function updateDisplays() {
      focusDisplay.textContent = formatTime(focusTime * 60);
      breakDisplay.textContent = formatTime(breakTime * 60);
      counterDisplay.textContent = `${currentCount}/${totalCount}`;
    }

    function formatTime(seconds) {
      const m = String(Math.floor(seconds / 60)).padStart(2, "0");
      const s = String(seconds % 60).padStart(2, "0");
      return `${m}:${s}`;
    }

    function updateProgress() {
      if (isFocus) {
        const progress = remainingTime / (focusTime * 60);
        focusCircle.style.strokeDashoffset = focusCircumference * progress;
      } else {
        const progress = remainingTime / (breakTime * 60);
        breakCircle.style.strokeDashoffset = breakCircumference * progress;
      }
    }

    function startTimer() {
      if (!isRunning) {
        // 처음 시작
        focusTime = parseInt(document.getElementById("focus-input").value);
        breakTime = parseInt(document.getElementById("break-input").value);
        totalCount = parseInt(document.getElementById("count-input").value);
        currentCount = 0;
        isFocus = true;
        remainingTime = focusTime * 60;
        updateDisplays();
        runInterval();
        isRunning = true;
        isPaused = false;
        setPauseIcon(); // ▶ → ⏸
      } else if (!isPaused) {
        // 실행 중 → 일시정지
        clearInterval(timer);
        timer = null;
        isPaused = true;
        setPlayIcon(); // ⏸ → ▶
      } else {
        // 일시정지 상태 → 재개
        runInterval();
        isPaused = false;
        setPauseIcon(); // ▶ → ⏸
      }
    }

    function runInterval() {
      timer = setInterval(runTimer, 1000);
    }

    function runTimer() {
      remainingTime--;
      if (isFocus) {
        focusDisplay.textContent = formatTime(remainingTime);
      } else {
        breakDisplay.textContent = formatTime(remainingTime);
      }

      updateProgress(); // 진행률 업데이트

      if (remainingTime <= 0) {
        if (isFocus) {
          currentCount++;
          counterDisplay.textContent = `${currentCount}/${totalCount}`;
          if (currentCount >= totalCount) {
            stopTimer(); // 종료
            return;
          }
          isFocus = false;
          remainingTime = breakTime * 60;
        } else {
          isFocus = true;
          remainingTime = focusTime * 60;
        }
      }
    }

    function stopTimer() {
      clearInterval(timer);
      timer = null;
      isRunning = false;
      isPaused = false;
      currentCount = 0;
      updateDisplays();
      setPlayIcon(); // 항상 ▶로 초기화
      // 원형 진행률 초기화
      focusCircle.style.strokeDashoffset = focusCircumference;
      breakCircle.style.strokeDashoffset = breakCircumference;
    }

    startBtn.addEventListener("click", startTimer);
    stopBtn.addEventListener("click", stopTimer);

    /* 초기 상태: ▶ 아이콘 */
    setPlayIcon();

    // BGM 버튼
    const bgmBtn = document.getElementById("bgm-btn");
    let bgmAudio = null;
    let bgmOn = false;

    bgmBtn.addEventListener("click", () => {
      if (!bgmOn) {
        // BGM 켜기 - 무료 빗소리 ASMR (공개 도메인)
        if (!bgmAudio) {
          bgmAudio = new Audio("https://www.soundjay.com/nature/sounds/rain-01.mp3");
          bgmAudio.loop = true;
          bgmAudio.volume = 0.4;
        }
        bgmAudio.play().catch(() => {
          alert("브라우저 정책으로 자동재생이 차단됐어요.\n직접 클릭해서 다시 시도해보세요!");
        });
        bgmOn = true;
        bgmBtn.classList.add("bgm-on");
        bgmBtn.textContent = "🔊";
        bgmBtn.title = "배경음악 끄기";
      } else {
        // BGM 끄기
        if (bgmAudio) {
          bgmAudio.pause();
          bgmAudio.currentTime = 0;
        }
        bgmOn = false;
        bgmBtn.classList.remove("bgm-on");
        bgmBtn.textContent = "🎵";
        bgmBtn.title = "배경음악 켜기";
      }
    });

    // 우상단 버튼들

    // 버튼 요소 가져오기
    const mypageBtn = document.querySelector(".top-right-buttons .circle-btn:nth-child(1)");
    const calendarBtn = document.querySelector(".top-right-buttons .circle-btn:nth-child(2)");
    const memoToggleBtn = document.querySelector(".top-right-buttons .circle-btn:nth-child(3)");
    const memoBox = document.getElementById("memo-box");

    // 공통 로그인 체크 함수
    async function checkLogin() {
      try {
        const res = await fetch("/timer/api/timer-data");
        if (!res.ok) return false; // 401 등 비로그인 상태
        const data = await res.json();
        return data.logged_in;
      } catch (err) {
        console.error(err);
        alert("서버와 연결할 수 없습니다.");
        return false;
      }
    }

    // 마이페이지 버튼
    mypageBtn.addEventListener("click", async () => {
      const loggedIn = await checkLogin();
      if (!loggedIn) {
        const goLogin = confirm("로그인이 필요합니다");
        if (goLogin) window.location.href = "/templates/login.html";
        return;
      }
      window.location.href = "/templates/mypage.html";
    });

    // 캘린더 버튼
    calendarBtn.addEventListener("click", async () => {
      const loggedIn = await checkLogin();
      if (!loggedIn) {
        const goLogin = confirm("로그인이 필요합니다");
        if (goLogin) window.location.href = "/templates/login.html";
        return;
      }
      window.location.href = "/templates/mycalendar.html";
    });

    // 메모 버튼, 로그인 기능 작동시 아래의 비로그인 영역과 교체
    memoToggleBtn.addEventListener("click", async () => {
      try {
        const res = await fetch("/timer/api/timer-data", { credentials: "include" });

        if (!res.ok) {
          // 로그인 안 된 상태 → confirm 띄우기
          const goLogin = confirm("로그인이 필요합니다");
          if (goLogin) {
            window.location.href = "/templates/login.html";
          }
          return;
        }

        const data = await res.json();

        if (!data.logged_in) {
          const goLogin = confirm("로그인이 필요합니다");
          if (goLogin) {
            window.location.href = "/templates/login.html";
          }
          return;
        }

        // 로그인된 상태 → 메모 박스 토글
        if (memoBox.style.display === "none" || memoBox.style.display === "") {
          memoBox.style.display = "block";
          loadMemos(); // 박스 열릴 때 메모 목록 불러오기
        } else {
          memoBox.style.display = "none";
        }

      } catch (err) {
        console.error("서버 연결 실패", err);
        alert("서버와 연결할 수 없습니다.");
      }
    });

    // // 비 로그인 테스트용
    // memoToggleBtn.addEventListener("click", () => {
    //   if (memoBox.style.display === "none" || memoBox.style.display === "") {
    //     memoBox.style.display = "block"; // 열기
    //   } else {
    //     memoBox.style.display = "none";  // 닫기
    //   }
    // });

    // 여기서부터는 메모
    const memoHeader = document.getElementById("memo-header");


    let isDragging = false;
    let offsetX, offsetY;



    memoHeader.addEventListener("mousedown", (e) => {
      isDragging = true;
      offsetX = e.clientX - memoBox.offsetLeft;
      offsetY = e.clientY - memoBox.offsetTop;
    });

    document.addEventListener("mousemove", (e) => {
      if (isDragging) {
        memoBox.style.left = (e.clientX - offsetX) + "px";
        memoBox.style.top = (e.clientY - offsetY) + "px";
      }
    });

    document.addEventListener("mouseup", () => {
      isDragging = false;
    });



    const addMemoBtn = document.getElementById("add-memo-btn");

    // 메모 추가
    addMemoBtn.addEventListener("click", () => {
      const memoItem = document.createElement("div");
      memoItem.className = "memo-item";

      memoItem.innerHTML = `
        <div class="memo-title">
          <span>새 메모 제목</span>
          <div class="memo-actions">
            <button class="edit-btn">✏️</button>
            <button class="delete-btn">🗑️</button>
          </div>
        </div>
        <div class="memo-body">메모 내용을 입력하세요...</div>
      `;

      memoContent.appendChild(memoItem);

      attachMemoEvents(memoItem);

      // 새 메모는 바로 편집 모드로 시작
      const editBtn = memoItem.querySelector(".edit-btn");
      editBtn.click();
    });

    // 메모 이벤트 연결
    function attachMemoEvents(memoItem, isNew = true) {
  const title = memoItem.querySelector(".memo-title span");
  const body = memoItem.querySelector(".memo-body");
  const editBtn = memoItem.querySelector(".edit-btn");
  const deleteBtn = memoItem.querySelector(".delete-btn");

  if (isNew) {
    setPlaceholder(title, "새 메모 제목");
    setPlaceholder(body, "메모 내용을 입력하세요...");
  }

  // 타이틀 클릭 → 서버 내용 불러오기 + 펼치기/접기
  title.addEventListener("click", async () => {
    if (editBtn.textContent === "✏️") {
      if (body.style.display === "none" || body.style.display === "") {
        // 서버에서 내용 불러오기
        const memoId = memoItem.dataset.id;
        if (memoId) {
          try {
            const res = await fetch(`/timer/memo/${memoId}`, { credentials: "include" });
            if (res.ok) {
              const memoData = await res.json();
              body.textContent = memoData.content;
            }
          } catch (err) {
            console.error("메모 불러오기 실패", err);
          }
        }
        body.style.display = "block";
      } else {
        body.style.display = "none";
      }
    }
  });

  // 수정 버튼
  editBtn.addEventListener("click", async () => {
    if (editBtn.textContent === "✏️") {
      title.setAttribute("contenteditable", "true");
      body.setAttribute("contenteditable", "true");
      body.style.display = "block";
      title.focus();
      editBtn.textContent = "💾";
    } else {
      title.removeAttribute("contenteditable");
      body.removeAttribute("contenteditable");
      editBtn.textContent = "✏️";
      body.style.display = "block";

      try {
        const res = await fetch("/timer/memo/write", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            id: memoItem.dataset.id || null,
            title: title.textContent,
            content: body.textContent
          })
        });
        const data = await res.json();
        if (res.ok) {
          memoItem.dataset.id = data.memo.id;
          alert("메모 저장 완료!");
        } else {
          alert(data.detail || "메모 저장 실패");
        }
      } catch (err) {
        console.error("메모 저장 실패", err);
      }
    }
  });

  // 삭제 버튼
  deleteBtn.addEventListener("click", async () => {
    if (!confirm("정말 삭제하시겠습니까?")) return;
    const memoId = memoItem.dataset.id;
    if (!memoId) {
      memoItem.remove();
      return;
    }
    try {
      const res = await fetch(`/timer/memo/${memoId}`, { method: "DELETE" });
      if (res.ok) {
        alert("메모 삭제 완료!");
        memoItem.remove();
      } else {
        alert("메모 삭제 실패");
      }
    } catch (err) {
      console.error("메모 삭제 실패", err);
    }
  });

  // Tab → body로 이동
  title.addEventListener("keydown", (e) => {
    if (e.key === "Tab") {
      e.preventDefault();
      body.focus();
    }
  });

  // placeholder 처리
  title.addEventListener("focus", () => clearPlaceholder(title, "새 메모 제목"));
  title.addEventListener("blur", () => restorePlaceholder(title, "새 메모 제목"));
  body.addEventListener("focus", () => clearPlaceholder(body, "메모 내용을 입력하세요..."));
  body.addEventListener("blur", () => restorePlaceholder(body, "메모 내용을 입력하세요..."));
}

    // placeholder 유틸 함수
    function setPlaceholder(el, text) {
      el.textContent = text;
      el.classList.add("placeholder");
    }

    function clearPlaceholder(el, text) {
      if (el.textContent === text) {
        el.textContent = "";
        el.classList.remove("placeholder");
      }
    }

    function restorePlaceholder(el, text) {
      if (el.textContent.trim() === "") {
        el.textContent = text;
        el.classList.add("placeholder");
      }
    }

    
    

  </script>
</body>
</html>
