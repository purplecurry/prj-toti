<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Pomodoro Timer</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f5f5f5;
    }

    .timer-container {
      position: relative;
      width: 300px;
      height: 300px;
      margin-bottom: 20px;
    }

    /* 원형 진행바 (SVG) */
    .circle {
      position: absolute;
      top: 0;
      left: 0;
    }

    #focus-circle{
      fill: none;
      stroke-width: 40;
      stroke-linecap: round;
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
      transition: stroke-dashoffset 1s linear; /* 부드럽게 변화 */
      stroke: red;
    }

    #break-circle {
      fill: none;
      stroke-width: 20;
      stroke-linecap: round;
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
      transition: stroke-dashoffset 1s linear; /* 부드럽게 변화 */
      stroke: green;
    }

    /* 중앙 박스 */
    .time-box {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #d0d0d0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .counter {
      font-size: 1.2em;
      color: black;
      margin-bottom: 10px;
      font-weight: normal;
    }

    .big-time {
      font-size: 2em;
      font-weight: bold;
      color: black;
    }

    .small-time {
      font-size: 1.2em;
      color: black;
      margin-top: 10px;
    }

    /* 하단 바 전체 */
    .bottom-bar {
      display: flex;
      justify-content: space-between; /* 왼쪽은 inputs, 오른쪽은 버튼 */
      align-items: center;
      width: 800px; /* 가로 길이 확장 */
      margin-top: 50px; /* 타이머와 간격 확보 */
      padding: 15px 20px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #f9f9f9;
    }

    /* 입력 박스 */
    .inputs {
      display: flex;
      gap: 15px;
      font-size: 1.5em; /* 글자 크기 확대 */
    }

    .inputs input {
      width: 90px;
      font-size: 1.2em;
      text-align: center;
    }

    /* 버튼 */
    .controls {
      display: flex;
      flex-direction: row; /* 버튼 가로 정렬 */
      gap: 10px;
    }

    .controls button {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 50px;   /* 버튼 크기 고정 */
      height: 50px;  /* 버튼 크기 고정 */
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #f0f0f0;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .controls button:hover {
      background: #e0e0e0;
    }

    .controls svg {
      width: 24px;   /* 아이콘 크기 고정 */
      height: 24px;
      fill: #333;
    }

    /* 여기서부턴 메모 */
    .memo-box {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 300px;
      height: 400px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #ffffff;
      box-shadow: 2px 2px 8px rgba(0,0,0,0.2);
      resize: both;
      overflow: hidden;
      z-index: 1000;
      display: none; /* 기본은 닫혀 있음 */
    }

    .memo-header {
      background: #f0f0f0;
      padding: 6px 10px;
      cursor: move;
      font-weight: bold;
      border-bottom: 1px solid #ccc;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .memo-header button {
      background: #4caf50;
      color: white;
      border: none;
      border-radius: 4px;
      width: 24px;
      height: 24px;
      cursor: pointer;
    }

    .memo-content {
      padding: 10px;
      height: calc(100% - 40px);
      overflow-y: auto;
    }

    .memo-item {
      border: 1px solid #ddd;
      border-radius: 4px;
      margin-bottom: 8px;
    }

    .memo-title {
      background: #eee;
      padding: 6px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .memo-title span {
      flex-grow: 1;
    }

    .memo-actions {
      display: flex;
      gap: 6px;
    }

    .memo-actions button {
      background: none;
      border: none;
      cursor: pointer;
    }

    .memo-body {
      display: none;
      padding: 6px;
      background: #fafafa;
    }

    .memo-title span.placeholder,
    .memo-body.placeholder {
      color: #999; /* 회색 계열 */
      font-style: italic;
    }

    /* 우측 상단 버튼 관련 */

    .top-right-buttons {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column; /* 세로 정렬 */
      gap: 12px;              /* 버튼 간격 */
      z-index: 2000;
    }

    .circle-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: none;
      background: #e57373; /* 토마토 느낌의 붉은색 */
      box-shadow: 2px 2px 6px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
    }

    .circle-btn:hover {
      background: #ef9a9a; /* hover 시 조금 더 밝은 톤 */
    }

    .circle-btn svg {
      width: 24px;
      height: 24px;
      fill: white; /* 아이콘은 흰색으로 대비 */
    }

  </style>
</head>
<body>
  <!-- 메모 관련 -->
  <div id="memo-box" class="memo-box">
    <div id="memo-header" class="memo-header">
      메모
      <button id="add-memo-btn">+</button>
    </div>
    <div id="memo-content" class="memo-content">
      <!-- 메모 항목들이 여기에 추가됨 -->
    </div>
  </div>

  <!-- 우측 상단 버튼 -->
  <div class="top-right-buttons">
    <!-- 마이페이지 버튼 -->
    <button class="circle-btn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white">
        <path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z"/>
      </svg>
    </button>

    <!-- 캘린더 버튼 -->
    <button class="circle-btn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white">
        <path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.1 0-2 .9-2 
                2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 
                2-2V6c0-1.1-.9-2-2-2zm0 
                16H5V9h14v11z"/>
      </svg>
    </button>

    <!-- 메모 박스 열고 닫기 버튼 -->
    <button class="circle-btn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white">
        <path d="M3 4v16h18V4H3zm16 14H5V6h14v12zM7 8h10v2H7V8zm0 4h10v2H7v-2z"/>
      </svg>
    </button>

    <!-- BGM 버튼 -->
    <button class="circle-btn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white">
        <path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/>
      </svg>
    </button>
  </div>
  
  <!-- 타이머 및 관련 버튼 -->
  <div class="timer-container">
    <!-- 집중 타이머 (빨간색 원형) -->
    <svg class="circle" width="300" height="300">
      <circle id="focus-circle" cx="150" cy="150" r="100" />
    </svg>

    <!-- 휴식 타이머 (녹색 원형) -->
    <svg class="circle" width="300" height="300">
      <circle id="break-circle" cx="150" cy="150" r="90" />
    </svg>

    <div class="time-box">
      <div class="counter" id="counter">0/4</div>
      <div class="big-time" id="focus-time">25:00</div>
      <div class="small-time" id="break-time">05:00</div>
    </div>
  </div>


<!-- 하단 입력 + 버튼을 한 줄로 -->
<div class="bottom-bar">
  <div class="inputs">
    <label>집중 <input type="number" id="focus-input" value="25"></label>
    <label>휴식 <input type="number" id="break-input" value="5"></label>
    <label>횟수 <input type="number" id="count-input" value="4"></label>
  </div>
  <div class="controls">
    <!-- 재생 버튼 -->
    <button id="start-btn">
      <svg id="start-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M8 5v14l11-7z"/> <!-- ▶ 아이콘 -->
      </svg>
    </button>

    <!-- 정지 버튼 -->
    <button id="stop-btn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <rect x="6" y="6" width="12" height="12"/> <!-- ■ 아이콘 -->
      </svg>
    </button>
  </div>
</div>

  <script>
    let focusTime = 25;
    let breakTime = 5;
    let totalCount;
    let currentCount = 0;
    let timer = null;
    let isRunning = false;
    let isPaused = false;
    let isFocus = true;
    let remainingTime;

    const focusDisplay = document.getElementById("focus-time");
    const breakDisplay = document.getElementById("break-time");
    const counterDisplay = document.getElementById("counter");
    const startBtn = document.getElementById("start-btn");
    const stopBtn = document.getElementById("stop-btn");

    const focusCircle = document.getElementById("focus-circle");
    const breakCircle = document.getElementById("break-circle");
    const memoContent = document.getElementById("memo-content");
    // 원 둘레 계산
    const focusCircumference = 2 * Math.PI * 100; // r=100
    const breakCircumference = 2 * Math.PI * 90;  // r=90

    // 서버에서 값 가져오기
    async function loadTimerData() {
      try {
        const res = await fetch("/timer/api/timer-data", { credentials: "include" });
        if (!res.ok) return;
        const data = await res.json();
        focusTime = data.focus_time;
        breakTime = data.break_time;
        document.getElementById("focus-input").value = focusTime;
        document.getElementById("break-input").value = breakTime;
      } catch (err) {
        console.error("타이머 데이터 불러오기 실패", err);
      }
    }
    // 페이지 로드 시 실행
    loadTimerData();

async function loadMemos() {
  try {
    const res = await fetch("/timer/api/memos", { credentials: "include" });
    if (!res.ok) return;
    const data = await res.json();

    memoContent.innerHTML = "";

    data.memos.forEach(m => {
      const memoItem = document.createElement("div");
      memoItem.className = "memo-item";
      memoItem.dataset.id = m.id; // id 저장

      memoItem.innerHTML = `
        <div class="memo-title">
          <span>${m.title}</span>
          <div class="memo-actions">
            <button class="edit-btn">✏️</button>
            <button class="delete-btn">🗑️</button>
          </div>
        </div>
        <div class="memo-body" style="display:none;">불러오기 전 내용...</div>
      `;

      memoContent.appendChild(memoItem);

      // 서버 메모는 placeholder 적용 X
      attachMemoEvents(memoItem, false);
    });
  } catch (err) {
    console.error("메모 불러오기 실패", err);
  }
}

    focusCircle.style.strokeDasharray = focusCircumference;
    focusCircle.style.strokeDashoffset = focusCircumference;

    breakCircle.style.strokeDasharray = breakCircumference;
    breakCircle.style.strokeDashoffset = breakCircumference;

    /* ▶ 아이콘 */
    function setPlayIcon() {
      startBtn.innerHTML = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M8 5v14l11-7z"/>
        </svg>`;
    }

    /* ⏸ 아이콘 */
    function setPauseIcon() {
      startBtn.innerHTML = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M6 19h4V5H6zm8-14v14h4V5z"/>
        </svg>`;
    }

    function updateDisplays() {
      focusDisplay.textContent = formatTime(focusTime * 60);
      breakDisplay.textContent = formatTime(breakTime * 60);
      counterDisplay.textContent = `${currentCount}/${totalCount}`;
    }

    function formatTime(seconds) {
      const m = String(Math.floor(seconds / 60)).padStart(2, "0");
      const s = String(seconds % 60).padStart(2, "0");
      return `${m}:${s}`;
    }

    function updateProgress() {
      if (isFocus) {
        const progress = remainingTime / (focusTime * 60);
        focusCircle.style.strokeDashoffset = focusCircumference * progress;
      } else {
        const progress = remainingTime / (breakTime * 60);
        breakCircle.style.strokeDashoffset = breakCircumference * progress;
      }
    }

    function startTimer() {
      if (!isRunning) {
        // 처음 시작
        focusTime = parseInt(document.getElementById("focus-input").value);
        breakTime = parseInt(document.getElementById("break-input").value);
        totalCount = parseInt(document.getElementById("count-input").value);
        currentCount = 0;
        isFocus = true;
        remainingTime = focusTime * 60;
        updateDisplays();
        runInterval();
        isRunning = true;
        isPaused = false;
        setPauseIcon(); // ▶ → ⏸
      } else if (!isPaused) {
        // 실행 중 → 일시정지
        clearInterval(timer);
        timer = null;
        isPaused = true;
        setPlayIcon(); // ⏸ → ▶
      } else {
        // 일시정지 상태 → 재개
        runInterval();
        isPaused = false;
        setPauseIcon(); // ▶ → ⏸
      }
    }

    function runInterval() {
      timer = setInterval(runTimer, 1000);
    }

    function runTimer() {
      remainingTime--;
      if (isFocus) {
        focusDisplay.textContent = formatTime(remainingTime);
      } else {
        breakDisplay.textContent = formatTime(remainingTime);
      }

      updateProgress(); // 진행률 업데이트

      if (remainingTime <= 0) {
        if (isFocus) {
          currentCount++;
          counterDisplay.textContent = `${currentCount}/${totalCount}`;
          if (currentCount >= totalCount) {
            stopTimer(); // 종료
            return;
          }
          isFocus = false;
          remainingTime = breakTime * 60;
        } else {
          isFocus = true;
          remainingTime = focusTime * 60;
        }
      }
    }

    function stopTimer() {
      clearInterval(timer);
      timer = null;
      isRunning = false;
      isPaused = false;
      currentCount = 0;
      updateDisplays();
      setPlayIcon(); // 항상 ▶로 초기화
      // 원형 진행률 초기화
      focusCircle.style.strokeDashoffset = focusCircumference;
      breakCircle.style.strokeDashoffset = breakCircumference;
    }

    startBtn.addEventListener("click", startTimer);
    stopBtn.addEventListener("click", stopTimer);

    /* 초기 상태: ▶ 아이콘 */
    setPlayIcon();

    // 우상단 버튼들

    // 버튼 요소 가져오기
    const mypageBtn = document.querySelector(".top-right-buttons .circle-btn:nth-child(1)");
    const calendarBtn = document.querySelector(".top-right-buttons .circle-btn:nth-child(2)");
    const memoToggleBtn = document.querySelector(".top-right-buttons .circle-btn:nth-child(3)");
    const memoBox = document.getElementById("memo-box");

    // 공통 로그인 체크 함수
    async function checkLogin() {
      try {
        const res = await fetch("/timer/api/timer-data");
        if (!res.ok) return false; // 401 등 비로그인 상태
        const data = await res.json();
        return data.logged_in;
      } catch (err) {
        console.error(err);
        alert("서버와 연결할 수 없습니다.");
        return false;
      }
    }

    // 마이페이지 버튼
    mypageBtn.addEventListener("click", async () => {
      const loggedIn = await checkLogin();
      if (!loggedIn) {
        const goLogin = confirm("로그인이 필요합니다");
        if (goLogin) window.location.href = "/templates/login.html";
        return;
      }
      window.location.href = "/templates/mypage.html";
    });

    // 캘린더 버튼
    calendarBtn.addEventListener("click", async () => {
      const loggedIn = await checkLogin();
      if (!loggedIn) {
        const goLogin = confirm("로그인이 필요합니다");
        if (goLogin) window.location.href = "/templates/login.html";
        return;
      }
      window.location.href = "/templates/mycalendar.html";
    });

    // 메모 버튼, 로그인 기능 작동시 아래의 비로그인 영역과 교체
    memoToggleBtn.addEventListener("click", async () => {
      try {
        const res = await fetch("/timer/api/timer-data", { credentials: "include" });

        if (!res.ok) {
          // 로그인 안 된 상태 → confirm 띄우기
          const goLogin = confirm("로그인이 필요합니다");
          if (goLogin) {
            window.location.href = "/templates/login.html";
          }
          return;
        }

        const data = await res.json();

        if (!data.logged_in) {
          const goLogin = confirm("로그인이 필요합니다");
          if (goLogin) {
            window.location.href = "/templates/login.html";
          }
          return;
        }

        // 로그인된 상태 → 메모 박스 토글
        if (memoBox.style.display === "none" || memoBox.style.display === "") {
          memoBox.style.display = "block";
          loadMemos(); // 박스 열릴 때 메모 목록 불러오기
        } else {
          memoBox.style.display = "none";
        }

      } catch (err) {
        console.error("서버 연결 실패", err);
        alert("서버와 연결할 수 없습니다.");
      }
    });

    // // 비 로그인 테스트용
    // memoToggleBtn.addEventListener("click", () => {
    //   if (memoBox.style.display === "none" || memoBox.style.display === "") {
    //     memoBox.style.display = "block"; // 열기
    //   } else {
    //     memoBox.style.display = "none";  // 닫기
    //   }
    // });

    // 여기서부터는 메모
    const memoHeader = document.getElementById("memo-header");


    let isDragging = false;
    let offsetX, offsetY;



    memoHeader.addEventListener("mousedown", (e) => {
      isDragging = true;
      offsetX = e.clientX - memoBox.offsetLeft;
      offsetY = e.clientY - memoBox.offsetTop;
    });

    document.addEventListener("mousemove", (e) => {
      if (isDragging) {
        memoBox.style.left = (e.clientX - offsetX) + "px";
        memoBox.style.top = (e.clientY - offsetY) + "px";
      }
    });

    document.addEventListener("mouseup", () => {
      isDragging = false;
    });



    const addMemoBtn = document.getElementById("add-memo-btn");

    // 메모 추가
    addMemoBtn.addEventListener("click", () => {
      const memoItem = document.createElement("div");
      memoItem.className = "memo-item";

      memoItem.innerHTML = `
        <div class="memo-title">
          <span>새 메모 제목</span>
          <div class="memo-actions">
            <button class="edit-btn">✏️</button>
            <button class="delete-btn">🗑️</button>
          </div>
        </div>
        <div class="memo-body">메모 내용을 입력하세요...</div>
      `;

      memoContent.appendChild(memoItem);

      attachMemoEvents(memoItem);

      // 새 메모는 바로 편집 모드로 시작
      const editBtn = memoItem.querySelector(".edit-btn");
      editBtn.click();
    });

    // 메모 이벤트 연결
    function attachMemoEvents(memoItem, isNew = true) {
  const title = memoItem.querySelector(".memo-title span");
  const body = memoItem.querySelector(".memo-body");
  const editBtn = memoItem.querySelector(".edit-btn");
  const deleteBtn = memoItem.querySelector(".delete-btn");

  if (isNew) {
    setPlaceholder(title, "새 메모 제목");
    setPlaceholder(body, "메모 내용을 입력하세요...");
  }

  // 타이틀 클릭 → 서버 내용 불러오기 + 펼치기/접기
  title.addEventListener("click", async () => {
    if (editBtn.textContent === "✏️") {
      if (body.style.display === "none" || body.style.display === "") {
        // 서버에서 내용 불러오기
        const memoId = memoItem.dataset.id;
        if (memoId) {
          try {
            const res = await fetch(`/timer/memo/${memoId}`, { credentials: "include" });
            if (res.ok) {
              const memoData = await res.json();
              body.textContent = memoData.content;
            }
          } catch (err) {
            console.error("메모 불러오기 실패", err);
          }
        }
        body.style.display = "block";
      } else {
        body.style.display = "none";
      }
    }
  });

  // 수정 버튼
  editBtn.addEventListener("click", async () => {
    if (editBtn.textContent === "✏️") {
      title.setAttribute("contenteditable", "true");
      body.setAttribute("contenteditable", "true");
      body.style.display = "block";
      title.focus();
      editBtn.textContent = "💾";
    } else {
      title.removeAttribute("contenteditable");
      body.removeAttribute("contenteditable");
      editBtn.textContent = "✏️";
      body.style.display = "block";

      try {
        const res = await fetch("/timer/memo/write", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            id: memoItem.dataset.id || null,
            title: title.textContent,
            content: body.textContent
          })
        });
        const data = await res.json();
        if (res.ok) {
          memoItem.dataset.id = data.memo.id;
          alert("메모 저장 완료!");
        } else {
          alert(data.detail || "메모 저장 실패");
        }
      } catch (err) {
        console.error("메모 저장 실패", err);
      }
    }
  });

  // 삭제 버튼
  deleteBtn.addEventListener("click", async () => {
    if (!confirm("정말 삭제하시겠습니까?")) return;
    const memoId = memoItem.dataset.id;
    if (!memoId) {
      memoItem.remove();
      return;
    }
    try {
      const res = await fetch(`/timer/memo/${memoId}`, { method: "DELETE" });
      if (res.ok) {
        alert("메모 삭제 완료!");
        memoItem.remove();
      } else {
        alert("메모 삭제 실패");
      }
    } catch (err) {
      console.error("메모 삭제 실패", err);
    }
  });

  // Tab → body로 이동
  title.addEventListener("keydown", (e) => {
    if (e.key === "Tab") {
      e.preventDefault();
      body.focus();
    }
  });

  // placeholder 처리
  title.addEventListener("focus", () => clearPlaceholder(title, "새 메모 제목"));
  title.addEventListener("blur", () => restorePlaceholder(title, "새 메모 제목"));
  body.addEventListener("focus", () => clearPlaceholder(body, "메모 내용을 입력하세요..."));
  body.addEventListener("blur", () => restorePlaceholder(body, "메모 내용을 입력하세요..."));
}

    // placeholder 유틸 함수
    function setPlaceholder(el, text) {
      el.textContent = text;
      el.classList.add("placeholder");
    }

    function clearPlaceholder(el, text) {
      if (el.textContent === text) {
        el.textContent = "";
        el.classList.remove("placeholder");
      }
    }

    function restorePlaceholder(el, text) {
      if (el.textContent.trim() === "") {
        el.textContent = text;
        el.classList.add("placeholder");
      }
    }

    
    

  </script>
</body>
</html>
